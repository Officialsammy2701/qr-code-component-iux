<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Frontend Mentor QR code component challenge solution built with semantic HTML and responsive CSS."
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Frontend Mentor | QR code component</title>
  </head>
  <body>
    <main class="page-content">
      <article class="qr-card" aria-labelledby="card-title">
        <img
          class="qr-card__image"
          src="./images/image-qr-code.png"
          alt="QR code linking to Frontend Mentor"
          width="288"
          height="288"
        />

        <div class="qr-card__content">
          <h1 id="card-title" class="qr-card__title">
            Improve your front-end skills by building projects
          </h1>
          <p class="qr-card__text">
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://github.com/Officialsammy2701">Officialsammy2701</a>.
    </footer>
  </body>
</html>
